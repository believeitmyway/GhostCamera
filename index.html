<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Camera App</title>
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe Face Mesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="app-container">
    <!-- The hidden video element for camera stream -->
    <video id="videoElement" autoplay playsinline style="display: none;"></video>

    <!-- The canvas where processed frames are drawn -->
    <canvas id="outputCanvas"></canvas>

    <!-- UI Overlay -->
    <div class="ui-layer">
      <!-- Settings Button (Top Right) -->
      <button id="settingsBtn" class="icon-button top-right">
        <svg viewBox="0 0 24 24" fill="white" width="32px" height="32px">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>

      <!-- Shutter Button (Bottom Center) -->
      <button id="shutterBtn" class="shutter-button bottom-center">
        <div class="shutter-inner"></div>
      </button>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h2>設定 / Settings</h2>

        <div class="setting-item">
          <label for="cameraSelect">カメラの選択 / Camera:</label>
          <select id="cameraSelect">
            <option value="">読込中...</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="effectSelect">加工方法 / Effect:</label>
          <select id="effectSelect">
            <option value="eye-swap">目の左右反転 (Ghost)</option>
            <option value="eye-upside-down">目の上下反転</option>
            <option value="enlarge-iris">黒目拡大</option>
            <option value="none">なし (None)</option>
          </select>
        </div>

        <button id="closeSettingsBtn" class="close-btn">閉じる</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
